# kind cluster config for the CI HTTPS-edge E2E. Maps host 443 → the kind node so
# the hostNetwork ingress-nginx controller is reachable from the runner; the
# consolidated E2E curls https://<host>/... over the real edge (not a port-forward).
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
nodes:
  - role: control-plane
    extraPortMappings:
      - containerPort: 443
        hostPort: 443
