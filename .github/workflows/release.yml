name: release

# Publish charts to GHCR OCI (grouped under iterabase-charts/) and create a
# GitHub Release per chart tag with the packaged .tgz attached.
# Triggered by per-chart tags: <chart-name>-<semver>, e.g.
#   iterabase-platform-0.1.0, inference-gateway-0.1.0, control-plane-0.1.0
# The umbrella is packaged with dependencies baked in (helm dependency build first).
# Data-dep subcharts (postgresql/redis/minio) are bundled only — not released.

on:
  push:
    tags:
      - "iterabase-platform-*"
      - "inference-gateway-*"
      - "control-plane-*"

permissions:
  contents: write # create GitHub Releases
  packages: write # push to GHCR

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: azure/setup-helm@v4
      - name: helm repo add external chart repositories
        run: |
          helm repo add ingress-nginx https://kubernetes.github.io/ingress-nginx
          helm repo add metallb https://metallb.github.io/metallb
          helm repo add jetstack https://charts.jetstack.io
          helm repo add external-dns https://kubernetes-sigs.github.io/external-dns/
          helm repo add stakater https://stakater.github.io/stakater-charts
      - name: resolve chart + version from tag
        id: tag
        run: |
          TAG="${GITHUB_REF##*/}"
          CHART="${TAG%-*}"
          VERSION="${TAG##*-}"
          echo "chart=$CHART" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
      - name: build dependencies
        env:
          CHART: ${{ steps.tag.outputs.chart }}
        run: |
          # control-plane has its own file:// dep (postgresql); build it first so
          # the umbrella vendors control-plane with nested deps baked in.
          helm dependency build charts/control-plane
          helm dependency build "charts/$CHART"
      - name: package + push
        env:
          CHART: ${{ steps.tag.outputs.chart }}
          VERSION: ${{ steps.tag.outputs.version }}
        run: |
          helm package "charts/$CHART" --version "$VERSION" --destination .cr-release
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin
          for pkg in .cr-release/*.tgz; do
            helm push "$pkg" "oci://ghcr.io/${{ github.repository_owner }}/iterabase-charts"
          done
      - name: github release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: .cr-release/*.tgz
          generate_release_notes: true
