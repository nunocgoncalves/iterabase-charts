apiVersion: v2
name: control-plane
description: Iterabase control-plane service — IdentityMapping operator + identity store + JWT/JWKS API.
type: application
version: 0.2.15
appVersion: "0.0.14"
dependencies:
  # Bundled pgvector Postgres. Disabled/BYO via postgresql.enabled. The image is
  # overridden to pgvector because the control-plane's first migration creates
  # the pgvector extension.
  - name: postgresql
    version: 0.1.0
    repository: file://../postgresql
    condition: postgresql.enabled
