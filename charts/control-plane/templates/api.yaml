{{- if .Values.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "control-plane.apiName" . }}
  labels:
    {{- include "control-plane.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: control-plane
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: control-plane
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: api
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: wait-for-postgres
          image: postgres:16-alpine
          securityContext:
            runAsUser: 999
            runAsGroup: 999
          command:
            - sh
            - -c
            - 'until pg_isready -h {{ include "control-plane.pgHost" . }} -p {{ .Values.postgresql.port }} -U {{ .Values.postgresql.auth.username }}; do echo waiting for postgres; sleep 2; done'
        - name: migrate
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["/api"]
          args: ["migrate", "up"]
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "control-plane.pgSecret" . }}
                  key: {{ .Values.postgresql.passwordKey }}
            - name: DATABASE_URL
              value: {{ include "control-plane.databaseURL" . | quote }}
        - name: bootstrap
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["/api"]
          args:
            - bootstrap
            {{- range .Values.bootstrap.serviceAccounts }}
            - --service-account
            - {{ . | quote }}
            {{- end }}
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "control-plane.pgSecret" . }}
                  key: {{ .Values.postgresql.passwordKey }}
            - name: DATABASE_URL
              value: {{ include "control-plane.databaseURL" . | quote }}
      containers:
        - name: api
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["/api"]
          args: ["serve"]
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "control-plane.pgSecret" . }}
                  key: {{ .Values.postgresql.passwordKey }}
            - name: DATABASE_URL
              value: {{ include "control-plane.databaseURL" . | quote }}
            - name: API_ADDR
              value: {{ .Values.api.addr | quote }}
            - name: JWT_SIGNING_KEY_PATH
              value: {{ .Values.jwt.signingKeyPath | quote }}
            - name: JWT_KEY_ID
              value: {{ .Values.jwt.keyId | quote }}
            - name: IDENTITY_MODE
              value: {{ .Values.identity.mode | quote }}
            - name: LOG_LEVEL
              value: {{ .Values.logLevel | default "info" | quote }}
            - name: LOG_FORMAT
              value: {{ .Values.logFormat | default "json" | quote }}
          volumeMounts:
            - name: jwt
              mountPath: /etc/control-plane/jwt
              readOnly: true
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          {{- with .Values.api.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: jwt
          secret:
            secretName: {{ include "control-plane.jwtSecretName" . }}
            items:
              - key: private.pem
                path: private.pem
{{- end }}
