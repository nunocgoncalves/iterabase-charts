{{- if .Values.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "control-plane.apiName" . }}
  labels:
    {{- include "control-plane.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: control-plane
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: control-plane
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: api
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: wait-for-postgres
          image: postgres:16-alpine
          securityContext:
            runAsUser: 999
            runAsGroup: 999
          command:
            - sh
            - -c
            - 'until pg_isready -h {{ include "control-plane.pgHost" . }} -p {{ .Values.postgresql.port }} -U {{ .Values.postgresql.auth.username }}; do echo waiting for postgres; sleep 2; done'
          {{- if (or .Values.tls.enabled (dig "internalTLS" "enabled" false (.Values.global | default (dict)))) }}
          env:
            # pg_isready doesn't accept --sslmode; libpq reads these env vars,
            # so the readiness check connects over TLS (verify-full) like clients.
            - name: PGSSLMODE
              value: verify-full
            - name: PGSSLROOTCERT
              value: {{ .Values.tls.caMountPath | quote }}
          volumeMounts:
            - name: internal-ca
              mountPath: {{ dir .Values.tls.caMountPath }}
              readOnly: true
          {{- end }}
        - name: migrate
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["/api"]
          args: ["migrate", "up"]
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "control-plane.pgSecret" . }}
                  key: {{ .Values.postgresql.passwordKey }}
            - name: DATABASE_URL
              value: {{ include "control-plane.databaseURL" . | quote }}
          {{- if (or .Values.tls.enabled (dig "internalTLS" "enabled" false (.Values.global | default (dict)))) }}
          volumeMounts:
            - name: internal-ca
              mountPath: {{ dir .Values.tls.caMountPath }}
              readOnly: true
          {{- end }}
        - name: bootstrap
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["/api"]
          args:
            - bootstrap
            {{- range .Values.bootstrap.serviceAccounts }}
            - --service-account
            - {{ . | quote }}
            {{- end }}
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "control-plane.pgSecret" . }}
                  key: {{ .Values.postgresql.passwordKey }}
            - name: DATABASE_URL
              value: {{ include "control-plane.databaseURL" . | quote }}
          {{- if (or .Values.tls.enabled (dig "internalTLS" "enabled" false (.Values.global | default (dict)))) }}
          volumeMounts:
            - name: internal-ca
              mountPath: {{ dir .Values.tls.caMountPath }}
              readOnly: true
          {{- end }}
      containers:
        - name: api
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["/api"]
          args: ["serve"]
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "control-plane.pgSecret" . }}
                  key: {{ .Values.postgresql.passwordKey }}
            - name: DATABASE_URL
              value: {{ include "control-plane.databaseURL" . | quote }}
            - name: API_ADDR
              value: {{ .Values.api.addr | quote }}
            - name: JWT_SIGNING_KEY_PATH
              value: {{ .Values.jwt.signingKeyPath | quote }}
            - name: JWT_KEY_ID
              value: {{ .Values.jwt.keyId | quote }}
            - name: IDENTITY_MODE
              value: {{ .Values.identity.mode | quote }}
            - name: LOG_LEVEL
              value: {{ .Values.logLevel | default "info" | quote }}
            - name: LOG_FORMAT
              value: {{ .Values.logFormat | default "json" | quote }}
            {{- if (or .Values.tls.enabled (dig "internalTLS" "enabled" false (.Values.global | default (dict)))) }}
            # Env-gated HTTPS: the api serves HTTPS when both are set (HOR-371),
            # plain HTTP otherwise. The chart mounts the leaf cert at these paths.
            - name: TLS_CERT_FILE
              value: /etc/control-plane/tls/tls.crt
            - name: TLS_KEY_FILE
              value: /etc/control-plane/tls/tls.key
            {{- end }}
          volumeMounts:
            - name: jwt
              mountPath: /etc/control-plane/jwt
              readOnly: true
            {{- if (or .Values.tls.enabled (dig "internalTLS" "enabled" false (.Values.global | default (dict)))) }}
            - name: tls
              mountPath: /etc/control-plane/tls
              readOnly: true
            - name: internal-ca
              mountPath: {{ dir .Values.tls.caMountPath }}
              readOnly: true
            {{- end }}
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
              {{- if (or .Values.tls.enabled (dig "internalTLS" "enabled" false (.Values.global | default (dict)))) }}
              scheme: HTTPS
              {{- end }}
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
              {{- if (or .Values.tls.enabled (dig "internalTLS" "enabled" false (.Values.global | default (dict)))) }}
              scheme: HTTPS
              {{- end }}
            initialDelaySeconds: 15
            periodSeconds: 10
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          {{- with .Values.api.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: jwt
          secret:
            secretName: {{ include "control-plane.jwtSecretName" . }}
            items:
              - key: private.pem
                path: private.pem
        {{- if (or .Values.tls.enabled (dig "internalTLS" "enabled" false (.Values.global | default (dict)))) }}
        - name: tls
          secret:
            secretName: {{ include "control-plane.apiTLSSecretName" . }}
            defaultMode: 0640
        # The internal CA root Secret — mount ONLY ca.crt (never tls.key, the CA
        # private key) for client-side verify-full.
        - name: internal-ca
          secret:
            secretName: {{ required "control-plane.tls.caSecretName is required when tls.enabled" (include "control-plane.tlsCASecretName" .) | quote }}
            items:
              - key: ca.crt
                path: ca.crt
        {{- end }}
{{- end }}
