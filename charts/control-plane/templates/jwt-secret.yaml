{{- if .Values.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "control-plane.jwtSecretName" . }}
  labels:
    {{- include "control-plane.labels" . | nindent 4 }}
type: Opaque
{{- $existing := lookup "v1" "Secret" .Release.Namespace (include "control-plane.jwtSecretName" .) }}
{{- if $existing }}
data:
{{- range $k, $v := $existing.data }}
  {{ $k }}: {{ $v }}
{{- end }}
{{- else }}
stringData:
  private.pem: |
{{ genPrivateKey "rsa" | indent 4 }}
{{- end }}
{{- end }}
