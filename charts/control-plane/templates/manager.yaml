{{- if .Values.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "control-plane.managerName" . }}
  labels:
    {{- include "control-plane.labels" . | nindent 4 }}
    app.kubernetes.io/component: manager
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: control-plane
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: manager
  template:
    metadata:
      labels:
        app.kubernetes.io/name: control-plane
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: manager
    spec:
      serviceAccountName: {{ include "control-plane.serviceAccountName" . }}
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      {{- if (or .Values.tls.enabled (dig "internalTLS" "enabled" false (.Values.global | default (dict)))) }}
      volumes:
        # Internal CA root — ca.crt only (never tls.key) for client verify-full.
        - name: internal-ca
          secret:
            secretName: {{ required "control-plane.tls.caSecretName is required when tls.enabled" (include "control-plane.tlsCASecretName" .) | quote }}
            items:
              - key: ca.crt
                path: ca.crt
      {{- end }}
      initContainers:
        - name: wait-for-postgres
          image: postgres:16-alpine
          securityContext:
            runAsUser: 999
            runAsGroup: 999
          command:
            - sh
            - -c
            - 'until pg_isready -h {{ include "control-plane.pgHost" . }} -p {{ .Values.postgresql.port }} -U {{ .Values.postgresql.auth.username }}{{ if (or .Values.tls.enabled (dig "internalTLS" "enabled" false (.Values.global | default (dict)))) }} --sslmode=verify-full --sslrootcert={{ .Values.tls.caMountPath }}{{ end }}; do echo waiting for postgres; sleep 2; done'
          {{- if (or .Values.tls.enabled (dig "internalTLS" "enabled" false (.Values.global | default (dict)))) }}
          volumeMounts:
            - name: internal-ca
              mountPath: {{ dir .Values.tls.caMountPath }}
              readOnly: true
          {{- end }}
      containers:
        - name: manager
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["/manager"]
          args:
            {{- toYaml .Values.manager.args | nindent 12 }}
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "control-plane.pgSecret" . }}
                  key: {{ .Values.postgresql.passwordKey }}
            - name: DATABASE_URL
              value: {{ include "control-plane.databaseURL" . | quote }}
            - name: LOG_LEVEL
              value: {{ .Values.logLevel | default "info" | quote }}
            - name: LOG_FORMAT
              value: {{ .Values.logFormat | default "json" | quote }}
          ports:
            - name: health
              containerPort: 8081
          {{- if (or .Values.tls.enabled (dig "internalTLS" "enabled" false (.Values.global | default (dict)))) }}
          volumeMounts:
            - name: internal-ca
              mountPath: {{ dir .Values.tls.caMountPath }}
              readOnly: true
          {{- end }}
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
          {{- with .Values.manager.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
{{- end }}
