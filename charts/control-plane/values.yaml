enabled: true # standalone install renders everything; the umbrella toggles this via condition

image:
  repository: ghcr.io/nunocgoncalves/control-plane
  tag: "0.0.14"
  pullPolicy: IfNotPresent

# One image, two Deployments selected via command (see control-plane Dockerfile).
#   manager: ["/manager"]                — controller-runtime operator
#   api:     ["/api","serve"]            — HTTP API (JWKS, /v1/token, admin CRUD)
# migrate + bootstrap run as RBAC-less init containers on the api Deployment.
manager:
  args:
    - --health-probe-bind-address=:8081
  resources: {}
api:
  addr: ":8080"
  resources: {}

service:
  port: 8080

# JWT issuance (api only; the manager never reads this key). The signing key is
# an RSA private key, auto-generated into a Secret on first install (stable via
# helm lookup) and mounted read-only into the api container.
jwt:
  keyId: control-plane-1
  signingKeyPath: /etc/control-plane/jwt/private.pem
  secret: "" # default: <release>-control-plane-jwt

# Identity-resolution mode (enrolled | open). Enrolled = a linked
# IdentityMapping is required; unlinked surface users are denied.
identity:
  mode: enrolled

# Service accounts seeded by `bootstrap --service-account <name>` (scope=token).
bootstrap:
  serviceAccounts:
    - agent-fleet

# PostgreSQL connection. Defaults match the bundled pgvector postgresql
# subchart. To BYO: set postgresql.enabled=false and override host/secret.
postgresql:
  enabled: true
  # pgvector image override (the bundled postgresql subchart defaults to
  # postgres:16-alpine, which lacks the pgvector extension the control-plane
  # migration requires).
  image:
    repository: pgvector/pgvector
    tag: "pg16"
  auth:
    username: controlplane
    database: controlplane
    gatewayUser:
      enabled: true
      username: gateway
  # control-plane-local connection values (defaults match the subchart).
  host: "" # default: <release>-postgresql
  port: 5432
  passwordSecret: "" # default: <release>-postgresql
  passwordKey: password

resources: {}
