{{- if .Values.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "inference-gateway.name" . }}
  labels:
    {{- include "inference-gateway.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: inference-gateway
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: inference-gateway
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: gateway
    spec:
      {{- if (or .Values.tls.enabled (dig "internalTLS" "enabled" false (.Values.global | default (dict)))) }}
      volumes:
        # Internal CA root — ca.crt only (never tls.key, the CA private key) for
        # client-side verify (Postgres verify-full + Redis RootCAs).
        - name: internal-ca
          secret:
            secretName: {{ required "inference-gateway.tls.caSecretName is required when tls.enabled" (include "inference-gateway.tlsCASecretName" .) | quote }}
            items:
              - key: ca.crt
                path: ca.crt
      {{- end }}
      containers:
        - name: gateway
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "inference-gateway.pgSecret" . }}
                  key: {{ .Values.postgresql.passwordKey }}
            - name: DATABASE_URL
              value: {{ include "inference-gateway.databaseURL" . | quote }}
            - name: REDIS_URL
              value: {{ include "inference-gateway.redisURL" . | quote }}
            {{- if (or .Values.tls.enabled (dig "internalTLS" "enabled" false (.Values.global | default (dict)))) }}
            # Redis AUTH password (k8s expands $(REDIS_PASSWORD) in REDIS_URL).
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "inference-gateway.redisSecret" . }}
                  key: {{ .Values.redis.passwordKey }}
            # Points the gateway's redisOptions at the internal CA for rediss:// verify.
            - name: REDIS_TLS_CA_FILE
              value: {{ .Values.tls.caMountPath | quote }}
            {{- end }}
            - name: ADMIN_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "inference-gateway.adminSecretName" . }}
                  key: {{ .Values.adminApiKey.key }}
          {{- if (or .Values.tls.enabled (dig "internalTLS" "enabled" false (.Values.global | default (dict)))) }}
          volumeMounts:
            - name: internal-ca
              mountPath: {{ dir .Values.tls.caMountPath }}
              readOnly: true
          {{- end }}
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
{{- end }}
