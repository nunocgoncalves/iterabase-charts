{{- if .Values.enabled }}
{{- if .Values.ingress.enabled }}
{{- /* external-dns annotations (prod edge). hostname defaults to ingress.host;
    target is optional (origin IP/host external-dns points the A record at). */ -}}
{{- $ednsHostname := "" -}}
{{- $ednsTarget := "" -}}
{{- if .Values.ingress.externalDns.enabled -}}
{{- $ednsHostname = .Values.ingress.externalDns.hostname | default .Values.ingress.host -}}
{{- $ednsTarget = .Values.ingress.externalDns.target -}}
{{- end -}}
{{- /* TLS via cert-manager. When enabled, cert-manager's ingress-shim issues a
    cert for ingress.host (the SAN) into secretName using clusterIssuer, and
    ingress-nginx serves it. host + clusterIssuer are required when enabled. */ -}}
{{- $tlsEnabled := .Values.ingress.tls.enabled -}}
{{- $tlsSecret := "" -}}
{{- if $tlsEnabled -}}
{{- $_ := required "inference-gateway.ingress.host is required when ingress.tls.enabled" .Values.ingress.host -}}
{{- $_ = required "inference-gateway.ingress.tls.clusterIssuer is required when ingress.tls.enabled" .Values.ingress.tls.clusterIssuer -}}
{{- $tlsSecret = .Values.ingress.tls.secretName | default (printf "%s-gateway-tls" .Release.Name) -}}
{{- end -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "inference-gateway.name" . }}
  labels:
    {{- include "inference-gateway.labels" . | nindent 4 }}
  {{- if or $tlsEnabled $ednsHostname $ednsTarget }}
  annotations:
    {{- if $tlsEnabled }}
    cert-manager.io/cluster-issuer: {{ .Values.ingress.tls.clusterIssuer | quote }}
    {{- end }}
    {{- if $ednsHostname }}
    external-dns.alpha.kubernetes.io/hostname: {{ $ednsHostname | quote }}
    {{- end }}
    {{- if $ednsTarget }}
    external-dns.alpha.kubernetes.io/target: {{ $ednsTarget | quote }}
    {{- end }}
  {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  {{- if $tlsEnabled }}
  tls:
    - hosts:
        - {{ .Values.ingress.host | quote }}
      secretName: {{ $tlsSecret | quote }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "inference-gateway.name" . }}
                port:
                  number: {{ .Values.service.port }}
{{- end }}
{{- end }}
