{{- if .Values.enabled }}
{{- if .Values.ingress.enabled }}
{{- /* external-dns annotations (prod edge). hostname defaults to ingress.host;
    target is optional (origin IP/host external-dns points the A record at). */ -}}
{{- $ednsHostname := "" -}}
{{- $ednsTarget := "" -}}
{{- if .Values.ingress.externalDns.enabled -}}
{{- $ednsHostname = .Values.ingress.externalDns.hostname | default .Values.ingress.host -}}
{{- $ednsTarget = .Values.ingress.externalDns.target -}}
{{- end -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "inference-gateway.name" . }}
  labels:
    {{- include "inference-gateway.labels" . | nindent 4 }}
  {{- if or $ednsHostname $ednsTarget }}
  annotations:
    {{- if $ednsHostname }}
    external-dns.alpha.kubernetes.io/hostname: {{ $ednsHostname | quote }}
    {{- end }}
    {{- if $ednsTarget }}
    external-dns.alpha.kubernetes.io/target: {{ $ednsTarget | quote }}
    {{- end }}
  {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "inference-gateway.name" . }}
                port:
                  number: {{ .Values.service.port }}
      {{- if .Values.ingress.host }}
      host: {{ .Values.ingress.host | quote }}
      {{- end }}
{{- end }}
{{- end }}
