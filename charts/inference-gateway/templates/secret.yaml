{{- if .Values.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "inference-gateway.adminSecretName" . }}
  labels:
    {{- include "inference-gateway.labels" . | nindent 4 }}
type: Opaque
{{- $existing := lookup "v1" "Secret" .Release.Namespace (include "inference-gateway.adminSecretName" .) }}
{{- if $existing }}
data:
{{- range $k, $v := $existing.data }}
  {{ $k }}: {{ $v }}
{{- end }}
{{- else }}
stringData:
  {{ .Values.adminApiKey.key }}: {{ randAlphaNum 32 | quote }}
{{- end }}
{{- end }}
