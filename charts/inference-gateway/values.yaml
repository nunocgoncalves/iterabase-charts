enabled: true

image:
  repository: ghcr.io/nunocgoncalves/inference-gateway
  tag: "0.2.4"
  pullPolicy: IfNotPresent

replicaCount: 1

service:
  port: 8080

ingress:
  enabled: true
  className: nginx
  host: "" # catch-all when empty (HTTP only); REQUIRED when tls.enabled (cert SAN)
  # TLS via cert-manager. Enable alongside the umbrella's cert-manager +
  # cert-issuers deps: clusterIssuer names a ClusterIssuer cert-issuers renders
  # (selfsigned for kind/E2E, letsencrypt-prod for the prod overlay). cert-manager's
  # ingress-shim issues the cert into secretName (stable across upgrades) and
  # ingress-nginx serves it. Disable (tls.enabled=false) for a plain-HTTP edge.
  tls:
    enabled: false
    secretName: "" # default: <release>-gateway-tls
    clusterIssuer: "" # e.g. selfsigned (kind/E2E) / letsencrypt-prod (prod overlay)
  # external-dns integration (prod edge). When enabled, annotate this Ingress so
  # external-dns (source: ingress) creates the Cloudflare A record for the host.
  # Set inference-gateway.ingress.externalDns.enabled=true in the prod overlay
  # alongside external-dns.enabled=true (umbrella). No-op on kind/E2E.
  externalDns:
    enabled: false
    hostname: "" # DNS record name; defaults to ingress.host when empty
    target: "" # optional A-record target (IP/host); if unset external-dns uses the Ingress status.loadBalancer

# PostgreSQL connection. Defaults match the bundled postgresql subchart.
# To BYO: set postgresql.enabled=false (umbrella) and override these.
postgresql:
  host: "" # default: <release>-postgresql
  port: 5432
  database: controlplane
  username: gateway
  passwordSecret: "" # default: <release>-postgresql
  passwordKey: gateway-password

# Redis connection. Defaults match the bundled redis subchart.
redis:
  host: "" # default: <release>-redis
  port: 6379
  passwordSecret: "" # default: <release>-redis (the redis chart's AUTH Secret)
  passwordKey: redis-password

# Internal TLS (opt-in; the umbrella's internalTLS.enabled fans this on). The
# gateway is a TLS client only (no internal HTTPS server — its public edge is
# via ingress-shim). When enabled: DATABASE_URL uses sslmode=verify-full + the
# internal CA, REDIS_URL becomes rediss:// with the AUTH password, and
# REDIS_TLS_CA_FILE points the gateway at the mounted CA. caSecretName is
# required when enabled (the <release>-internal-ca-root Secret, set by umbrella).
tls:
  enabled: false
  caSecretName: ""   # required when enabled: the internal CA root Secret
  caMountPath: /etc/iterabase/internal-ca/ca.crt

# Admin API key — generated into a Secret on first install (stable via lookup).
adminApiKey:
  secret: "" # default: <release>-gateway-admin
  key: adminApiKey

resources: {}
