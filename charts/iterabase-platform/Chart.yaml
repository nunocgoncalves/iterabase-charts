apiVersion: v2
name: iterabase-platform
description: Iterabase platform umbrella chart — inference-gateway + control-plane + agent-fleet + Postgres/Redis/MinIO + ingress-nginx + cert-manager + external-dns.
type: application
version: 0.1.11
appVersion: "0.1.11"
dependencies:
  - name: redis
    version: 0.1.0
    repository: file://../redis
    condition: redis.enabled
  - name: minio
    version: 0.1.0
    repository: file://../minio
    condition: minio.enabled
  - name: inference-gateway
    version: 0.2.3
    repository: file://../inference-gateway
    condition: inference-gateway.enabled
  - name: control-plane
    version: 0.2.8
    repository: file://../control-plane
    condition: control-plane.enabled
  - name: agent-fleet
    version: 0.1.0
    repository: file://../agent-fleet
    condition: agent-fleet.enabled
  - name: ingress-nginx
    version: 4.15.1
    repository: https://kubernetes.github.io/ingress-nginx
    condition: ingress-nginx.enabled
  - name: cert-manager
    version: v1.21.0
    repository: https://charts.jetstack.io
    condition: cert-manager.enabled
  - name: cert-issuers
    version: 0.1.0
    repository: file://../cert-issuers
    condition: cert-issuers.enabled
  - name: external-dns
    version: 1.21.1
    repository: https://kubernetes-sigs.github.io/external-dns/
    condition: external-dns.enabled
