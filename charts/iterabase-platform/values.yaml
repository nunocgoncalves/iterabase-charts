# iterabase-platform umbrella defaults (single-node).

# --- Data deps (self-contained subcharts; disable + override to BYO) ---
# Postgres is provided by the control-plane chart (pgvector); the gateway reads
# the control-plane's schemas (catalog/identity/permissions) from it.
redis:
  enabled: true
minio:
  enabled: true

# --- Services ---
inference-gateway:
  enabled: true
control-plane:
  enabled: true # provides the shared pgvector Postgres + the schemas the gateway reads
agent-fleet:
  enabled: false # stub; ships in HOR-248+

# --- Ingress controller (bundled substrate) ---
# hostNetwork DaemonSet binds 80/443 on the node across IPv4+IPv6.
ingress-nginx:
  enabled: true
  controller:
    kind: DaemonSet
    hostNetwork: true
    dnsPolicy: ClusterFirstWithHostNet
    service:
      enabled: false
    hostPort:
      enabled: true
      ports:
        http: 80
        https: 443
    metrics:
      enabled: false

# --- cert-manager (edge TLS issuance) ---
# cert-manager is the edge TLS operator (jetstack chart). The issuer CRs it
# reconciles live in the `cert-issuers` subchart. Disable both for dev/kind
# smoke (`--set cert-manager.enabled=false --set cert-issuers.enabled=false`);
# enable `cert-issuers.letsencrypt` in the prod overlay (email + Cloudflare
# token-ref).
cert-manager:
  enabled: true
  crds:
    enabled: true

cert-issuers:
  enabled: true
  selfSigned:
    enabled: true # kind/E2E — no real domain
  letsencrypt:
    enabled: false # enable in prod overlay (needs email + Cloudflare token)
