# iterabase-platform umbrella defaults (single-node).

# --- Data deps (self-contained subcharts; disable + override to BYO) ---
# Postgres is provided by the control-plane chart (pgvector); the gateway reads
# the control-plane's schemas (catalog/identity/permissions) from it.
redis:
  enabled: true
minio:
  enabled: true

# --- Services ---
inference-gateway:
  enabled: true
  ingress:
    # Dev/kind default host (no real domain — pair with the self-signed issuer
    # below). Override to the real public host in the prod overlay (e.g.
    # gateway.opo1.example.com) alongside letsencrypt-prod + external-dns.
    host: gateway.iterabase.local
    tls:
      # Public HTTPS edge via cert-manager. The umbrella enables cert-manager +
      # cert-issuers by default; clusterIssuer references cert-issuers' self-signed
      # issuer (kind/E2E). Set clusterIssuer=letsencrypt-prod in the prod overlay.
      enabled: true
      clusterIssuer: selfsigned # cert-issuers.selfSigned.name
control-plane:
  enabled: true # provides the shared pgvector Postgres + the schemas the gateway reads
agent-fleet:
  enabled: false # stub; ships in HOR-248+

# --- Ingress controller (bundled substrate) ---
# Exposure mode: hostNetwork (single-node) vs LoadBalancer (HA/cloud). hostNetwork
# binds 80/443 directly on the node (DaemonSet, no Service) — use on single-node
# where 80/443 are free (kind/dev, OPO1 with nothing else on 80/443). When 80/443
# are already taken — the GPU-E2E FailedScheduling on 80/443 — switch to the
# LoadBalancer block below (MetalLB L2 with the node IP in the address pool on
# bare-metal, or the cloud LB). external-dns (prod overlay) points the gateway
# host's Cloudflare record at the controller's external address in either mode.
ingress-nginx:
  enabled: true
  controller:
    kind: DaemonSet
    hostNetwork: true
    dnsPolicy: ClusterFirstWithHostNet
    service:
      enabled: false
    hostPort:
      enabled: true
      ports:
        http: 80
        https: 443
    metrics:
      enabled: false
  # --- LoadBalancer mode (HA / OPO1 / cloud) ---
  # Replace the `controller:` block above with this when hostNetwork 80/443
  # conflict, or for HA. Requires a LoadBalancer implementation (MetalLB on
  # bare-metal, the cloud LB otherwise); the LB's external IP is what external-dns
  # publishes and Cloudflare proxies.
  # controller:
  #   kind: Deployment
  #   hostNetwork: false
  #   dnsPolicy: ClusterFirst
  #   service:
  #     enabled: true
  #     type: LoadBalancer
  #   hostPort:
  #     enabled: false

# --- cert-manager (edge TLS issuance) ---
# cert-manager is the edge TLS operator (jetstack chart). The issuer CRs it
# reconciles live in the `cert-issuers` subchart. Disable both for dev/kind
# smoke (`--set cert-manager.enabled=false --set cert-issuers.enabled=false`);
# enable `cert-issuers.letsencrypt` in the prod overlay (email + Cloudflare
# token-ref).
cert-manager:
  enabled: true
  crds:
    enabled: true

cert-issuers:
  enabled: true
  selfSigned:
    enabled: true # kind/E2E — no real domain
  letsencrypt:
    enabled: false # enable in prod overlay (needs email + Cloudflare token)

# --- external-dns (edge DNS → Cloudflare) ---
# external-dns syncs the gateway Ingress host into Cloudflare (A record), sharing
# the same Cloudflare API token Secret cert-issuers' Let's Encrypt DNS-01 solver
# references. Disabled by default — there is no kind/E2E mode (it needs a real
# Cloudflare zone + token); enable in the prod overlay.
#
# Prod overlay must:
#   - set external-dns.enabled=true
#   - set external-dns.domainFilters (e.g. ["opo1.example.com."]) to scope the zone
#   - provision the cloudflare-api-token Secret out-of-band (External Secrets /
#     SealedSecrets / manual) in this namespace — external-dns and cert-issuers
#     both reference it by name/key below.
#   - set inference-gateway.ingress.externalDns.enabled=true so the gateway
#     Ingress is annotated with its host (external-dns then creates the A record).
external-dns:
  enabled: false
  provider:
    name: cloudflare
  sources:
    - ingress
  policy: upsert-only # create/update only; never delete records (safe default; set `sync` in the overlay to also prune)
  domainFilters: [] # REQUIRED when enabled — scope to your Cloudflare zone
  # Cloudflare API token — same Secret cert-issuers.letsencrypt references.
  env:
    - name: CF_API_TOKEN
      valueFrom:
        secretKeyRef:
          name: cloudflare-api-token # shared with cert-issuers.letsencrypt
          key: api-token
  extraArgs:
    cloudflare-proxied: true # A records proxied through Cloudflare (orange cloud)
  rbac:
    create: true
  serviceAccount:
    create: true
