{{- if .Values.enabled }}
{{- if .Values.addresses }}
{{- /* Non-hook: applied during install (before `helm --wait`) so MetalLB
    allocates the ingress-nginx LoadBalancer IP *during* the wait. helm 3.21+
    --wait blocks on LoadBalancer Services getting an external IP, so a
    post-install hook here would deadlock (--wait runs before the hook). The
    metallb CRD ships in the same release (the `metallb` subchart's `crds`
    subchart); helm applies CRDs first and custom resources last, so the CRD is
    established (and the controller/webhook up) by the time this CR is applied. */ -}}
apiVersion: metallb.io/v1beta1
kind: IPAddressPool
metadata:
  name: {{ include "metallb-config.name" . }}
  labels:
    {{- include "metallb-config.labels" . | nindent 4 }}
spec:
  addresses:
    {{- toYaml .Values.addresses | nindent 4 }}
  autoAssign: {{ .Values.autoAssign }}
  avoidBuggyIPs: {{ .Values.avoidBuggyIPs }}
{{- end }}
{{- end }}
