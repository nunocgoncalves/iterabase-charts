{{- if .Values.enabled }}
{{- if .Values.addresses }}
{{- /* Non-hook: see ipaddresspool.yaml — applied during install so the L2
    announcement is active during `helm --wait` (MetalLB assigns the LB IP). */ -}}
apiVersion: metallb.io/v1beta1
kind: L2Advertisement
metadata:
  name: {{ include "metallb-config.name" . }}
  labels:
    {{- include "metallb-config.labels" . | nindent 4 }}
spec:
  ipAddressPools:
    - {{ include "metallb-config.name" . }}
  {{- with .Values.interfaces }}
  interfaces:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
{{- end }}
