{{- if .Values.enabled }}
{{- if .Values.addresses }}
apiVersion: metallb.io/v1beta1
kind: L2Advertisement
metadata:
  name: {{ include "metallb-config.name" . }}
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-weight: "11"
  labels:
    {{- include "metallb-config.labels" . | nindent 4 }}
spec:
  ipAddressPools:
    - {{ include "metallb-config.name" . }}
  {{- with .Values.interfaces }}
  interfaces:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
{{- end }}
