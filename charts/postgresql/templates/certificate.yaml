{{- if and .Values.enabled (or .Values.tls.enabled (dig "internalTLS" "enabled" false (.Values.global | default (dict)))) }}
{{- $name := include "postgresql.name" . }}
{{- $ns := .Release.Namespace }}
# Server leaf cert for Postgres TLS. SANs cover the Service DNS names clients
# connect with (sslmode=verify-full checks the hostname). Issued by the internal
# CA ClusterIssuer; cert-manager renews the mounted Secret (90d, renewBefore 15d).
# Pre-install/pre-upgrade hook (weight after the CA) so the Certificate exists
# before the StatefulSet pods start — see charts/cert-issuers for the ordering
# rationale. PostgreSQL reads ssl_cert_file/ssl_key_file at startup (and on
# SIGHUP); a renewed Secret does NOT auto-reload the server, so the StatefulSet
# is annotated for Stakater Reloader to restart it on Secret change (umbrella
# `reloader` dependency, enabled with internalTLS).
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ $name }}-tls
  labels:
    {{- include "postgresql.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "20"
spec:
  secretName: {{ $name }}-tls
  duration: 2160h      # 90d
  renewBefore: 360h    # 15d
  dnsNames:
    - {{ $name }}
    - {{ printf "%s.%s" $name $ns }}
    - {{ printf "%s.%s.svc" $name $ns }}
    - {{ printf "%s.%s.svc.cluster.local" $name $ns }}
  issuerRef:
    name: {{ .Values.tls.issuerName | quote }}
    kind: ClusterIssuer
{{- end }}
