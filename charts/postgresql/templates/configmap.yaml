{{- if and .Values.enabled .Values.auth.gatewayUser.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "postgresql.name" . }}-init
  labels:
    {{- include "postgresql.labels" . | nindent 4 }}
data:
  create-gateway-user.sh: |
    #!/bin/bash
    set -e
    psql -v ON_ERROR_STOP=1 -U "$POSTGRES_USER" -d "$POSTGRES_DB" <<-EOSQL
      CREATE USER "$GATEWAY_USER" WITH PASSWORD '$GATEWAY_PASSWORD';
    EOSQL
{{- end }}
