{{- if .Values.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "postgresql.secretName" . }}
  labels:
    {{- include "postgresql.labels" . | nindent 4 }}
type: Opaque
{{- $existing := lookup "v1" "Secret" .Release.Namespace (include "postgresql.secretName" .) }}
{{- if $existing }}
data:
{{- range $k, $v := $existing.data }}
  {{ $k }}: {{ $v }}
{{- end }}
{{- else }}
stringData:
  password: {{ randAlphaNum 32 | quote }}
{{- end }}
{{- end }}
