{{- if .Values.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "postgresql.name" . }}
  labels:
    {{- include "postgresql.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "postgresql.name" . }}
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: postgresql
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: postgresql
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: database
    spec:
      {{- if (or .Values.tls.enabled (dig "internalTLS" "enabled" false (.Values.global | default (dict)))) }}
      # fsGroup = postgres (999) so the server process can read the
      # cert-manager-mounted tls.key (defaultMode 0640, root-owned, group postgres).
      securityContext:
        fsGroup: 999
      {{- end }}
      volumes:
        {{- if .Values.auth.gatewayUser.enabled }}
        - name: init-scripts
          configMap:
            name: {{ include "postgresql.name" . }}-init
        {{- end }}
        {{- if (or .Values.tls.enabled (dig "internalTLS" "enabled" false (.Values.global | default (dict)))) }}
        - name: tls
          secret:
            secretName: {{ include "postgresql.name" . }}-tls
            defaultMode: 0640
        - name: pghba
          configMap:
            name: {{ include "postgresql.name" . }}-pghba
            items:
              - key: pg_hba.conf
                path: pg_hba.conf
        {{- end }}
      containers:
        - name: postgresql
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- if (or .Values.tls.enabled (dig "internalTLS" "enabled" false (.Values.global | default (dict)))) }}
          # The official entrypoint prepends `postgres` when the first arg starts
          # with `-`, so these -c flags reach the postgres process directly.
          args:
            - -c
            - ssl=on
            - -c
            - ssl_cert_file=/var/lib/postgresql/tls/tls.crt
            - -c
            - ssl_key_file=/var/lib/postgresql/tls/tls.key
            - -c
            - hba_file=/etc/postgresql/pg_hba.conf
          {{- end }}
          env:
            - name: POSTGRES_USER
              value: {{ .Values.auth.username | quote }}
            - name: POSTGRES_DB
              value: {{ .Values.auth.database | quote }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "postgresql.secretName" . }}
                  key: password
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
            {{- if .Values.auth.gatewayUser.enabled }}
            - name: GATEWAY_USER
              value: {{ .Values.auth.gatewayUser.username | quote }}
            - name: GATEWAY_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "postgresql.secretName" . }}
                  key: gateway-password
            {{- end }}
          ports:
            - name: tcp-postgresql
              containerPort: 5432
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - {{ .Values.auth.username | quote }}
                - -d
                - {{ .Values.auth.database | quote }}
                {{- if (or .Values.tls.enabled (dig "internalTLS" "enabled" false (.Values.global | default (dict)))) }}
                - --sslmode=require
                {{- end }}
            initialDelaySeconds: 5
            periodSeconds: 5
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            {{- if .Values.auth.gatewayUser.enabled }}
            - name: init-scripts
              mountPath: /docker-entrypoint-initdb.d
            {{- end }}
            {{- if (or .Values.tls.enabled (dig "internalTLS" "enabled" false (.Values.global | default (dict)))) }}
            - name: tls
              mountPath: /var/lib/postgresql/tls
              readOnly: true
            - name: pghba
              mountPath: /etc/postgresql/pg_hba.conf
              subPath: pg_hba.conf
              readOnly: true
            {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- if .Values.persistence.storageClass }}
        storageClassName: {{ .Values.persistence.storageClass | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.persistence.size }}
{{- end }}
