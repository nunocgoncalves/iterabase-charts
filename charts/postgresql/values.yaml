enabled: true

image:
  repository: postgres
  tag: "16-alpine"
  pullPolicy: IfNotPresent

auth:
  username: gateway
  database: gateway
  # password is generated into a Secret on first install (stable via lookup).
  gatewayUser:
    enabled: false
    username: gateway

persistence:
  storageClass: "" # use cluster default (k3s local-path)
  size: 10Gi

resources: {}
