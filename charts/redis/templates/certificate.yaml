{{- if and .Values.enabled (or .Values.tls.enabled (dig "internalTLS" "enabled" false (.Values.global | default (dict)))) }}
{{- $name := include "redis.name" . }}
{{- $ns := .Release.Namespace }}
# Server leaf cert for Redis TLS. SANs cover the Service DNS names clients
# connect with (rediss:// + RootCAs verifies the hostname). Issued by the
# internal CA; cert-manager rotates it (90d). Post-install hook (after the CA).
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ $name }}-tls
  labels:
    {{- include "redis.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-weight: "20"
spec:
  secretName: {{ $name }}-tls
  duration: 2160h      # 90d
  renewBefore: 360h    # 15d
  dnsNames:
    - {{ $name }}
    - {{ printf "%s.%s" $name $ns }}
    - {{ printf "%s.%s.svc" $name $ns }}
    - {{ printf "%s.%s.svc.cluster.local" $name $ns }}
  issuerRef:
    name: {{ .Values.tls.issuerName | quote }}
    kind: ClusterIssuer
{{- end }}
